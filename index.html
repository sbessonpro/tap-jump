<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a10" />
  <title>Shadow Crawl</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <div id="hp-wrap"><div id="hp-bar"></div><span id="hp-text">100/100</span></div>
        <div id="distance">0 m</div>
      </div>
      <div class="hud-right">
        <div id="coins">⛁ 0</div>
        <div id="kills">☠ 0</div>
        <button id="shop-btn" class="hud-btn">🏪 Boutique</button>
      </div>
    </div>

    <!-- Virtual joystick -->
    <div id="joy-zone">
      <div id="joy-base"><div id="joy-stick"></div></div>
    </div>

    <!-- Action buttons -->
    <div id="actions">
      <button id="weapon-btn" class="action-btn">
        <span id="weapon-icon">⚔</span>
        <span id="weapon-name">Épée</span>
      </button>
      <button id="attack-btn" class="action-btn primary">ATK</button>
    </div>

    <!-- Shop modal -->
    <div id="shop-modal">
      <div class="shop-panel">
        <div class="shop-header">
          <h2>Boutique du donjon</h2>
          <div id="shop-coins">⛁ 0</div>
          <button id="shop-close">✕</button>
        </div>
        <div id="shop-list"></div>
      </div>
    </div>

    <!-- Overlay screens -->
    <div id="overlay" class="visible">
      <h1>Shadow Crawl</h1>
      <p class="subtitle">Avance dans les ténèbres</p>
      <div class="legend">
        <div><span class="kbd">Joystick</span> déplacer</div>
        <div><span class="kbd">ATK</span> attaquer</div>
        <div><span class="kbd">⚔/🏹/🔨</span> changer d'arme</div>
        <div><span class="kbd">Boutique</span> acheter des bonus</div>
      </div>
      <button id="start-btn">Entrer dans le donjon</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
